
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NutriScan AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Plus Jakarta Sans', sans-serif;
        background: #f8fafc;
        overflow-x: hidden;
      }
      
      .glass {
        background: rgba(255, 255, 255, 0.4);
        backdrop-filter: blur(40px);
        -webkit-backdrop-filter: blur(40px);
        border: 1px solid rgba(255, 255, 255, 0.4);
        box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.07);
      }

      .mesh-bg {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: -1;
        overflow: hidden;
        background: linear-gradient(135deg, #fdf2f8 0%, #f0f9ff 50%, #eef2ff 100%);
      }

      .mesh-circle {
        position: absolute;
        filter: blur(100px);
        border-radius: 100%;
        opacity: 0.5;
        animation: float 20s infinite ease-in-out;
      }

      @keyframes float {
        0%, 100% { transform: translate(0, 0) scale(1); }
        33% { transform: translate(30px, -50px) scale(1.1); }
        66% { transform: translate(-20px, 20px) scale(0.9); }
      }

      .hero-gradient {
        background: linear-gradient(180deg, rgba(0,0,0,0) 0%, rgba(0,0,0,0.4) 100%);
      }

      ::-webkit-scrollbar { width: 8px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.05); border-radius: 10px; }
      ::-webkit-scrollbar-thumb:hover { background: rgba(0,0,0,0.1); }
    </style>
    <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@19.0.0",
    "react-dom": "https://esm.sh/react-dom@19.0.0",
    "react-dom/client": "https://esm.sh/react-dom@19.0.0/client",
    "lucide-react": "https://esm.sh/lucide-react@0.475.0",
    "@google/genai": "https://esm.sh/@google/genai@1.34.0",
    "mermaid": "https://esm.sh/mermaid@10.9.0",
    "firebase/app": "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js",
    "firebase/auth": "https://www.gstatic.com/firebasejs/10.13.0/firebase-auth.js",
    "firebase/firestore": "https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore.js",
    "firebase/storage": "https://www.gstatic.com/firebasejs/10.13.0/firebase-storage.js",
    "firebase/analytics": "https://www.gstatic.com/firebasejs/10.13.0/firebase-analytics.js"
  }
}
</script>
  </head>
  <body class="antialiased">
    <div class="mesh-bg">
      <div class="mesh-circle bg-rose-200 w-[600px] h-[600px] top-[-10%] left-[-10%]"></div>
      <div class="mesh-circle bg-sky-200 w-[700px] h-[700px] bottom-[-10%] right-[-10%] animation-delay-2000" style="animation-direction: reverse;"></div>
      <div class="mesh-circle bg-indigo-200 w-[500px] h-[500px] top-[20%] right-[10%] animation-delay-4000"></div>
    </div>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
