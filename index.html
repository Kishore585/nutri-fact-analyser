<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NutriAI</title>
  <meta name="description"
    content="AI-powered nutritional label analysis for personalized health insights. Scan, analyze, and understand your food." />
  <script src="https://cdn.tailwindcss.com"></script>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600&display=swap"
    rel="stylesheet">
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
          },
          colors: {
            surface: {
              DEFAULT: '#FAFAF8',
              dim: '#F2F1ED',
              bright: '#FFFFFF',
              container: '#F5F4F0',
              'container-high': '#EEEDEA',
            },
            primary: {
              DEFAULT: 'var(--color-primary)',
              container: 'var(--color-primary-container)',
              'on-container': 'var(--color-primary-on-container)',
              light: 'var(--color-primary-light)',
            },
            on: {
              surface: '#1C1B1A',
              'surface-variant': '#6B6966',
            },
            outline: {
              DEFAULT: '#C8C5BF',
              variant: '#E0DED9',
            },
            accent: {
              teal: '#2D9F80',
              warm: '#C47D4A',
              rose: '#D4627A',
            },
            // Dark mode palette
            dark: {
              bg: '#0F0F0F',
              surface: '#1A1A1A',
              'surface-dim': '#141414',
              'surface-container': '#222222',
              'surface-container-high': '#2A2A2A',
              'surface-bright': '#2E2E2E',
              border: '#333333',
              'border-variant': '#2A2A2A',
              text: '#E8E6E3',
              'text-secondary': '#9A9896',
              'primary': 'var(--color-dark-primary)',
              'primary-container': 'var(--color-dark-primary-container)',
              'primary-light': 'var(--color-dark-primary-light)',
            }
          },
          borderRadius: {
            'xl': '12px',
            '2xl': '16px',
            '3xl': '24px',
            '4xl': '28px',
          },
          boxShadow: {
            'elevation-1': '0 1px 3px 1px rgba(0,0,0,0.05), 0 1px 2px 0 rgba(0,0,0,0.06)',
            'elevation-2': '0 2px 6px 2px rgba(0,0,0,0.05), 0 1px 2px 0 rgba(0,0,0,0.06)',
            'elevation-3': '0 6px 10px 4px rgba(0,0,0,0.05), 0 2px 3px 0 rgba(0,0,0,0.06)',
            'elevation-4': '0 8px 12px 6px rgba(0,0,0,0.05), 0 4px 4px 0 rgba(0,0,0,0.06)',
            'dark-elevation-1': '0 1px 3px 1px rgba(0,0,0,0.3), 0 1px 2px 0 rgba(0,0,0,0.4)',
            'dark-elevation-2': '0 2px 6px 2px rgba(0,0,0,0.3), 0 1px 2px 0 rgba(0,0,0,0.4)',
            'dark-elevation-3': '0 6px 10px 4px rgba(0,0,0,0.3), 0 2px 3px 0 rgba(0,0,0,0.4)',
          },
          animation: {
            'fade-in': 'fadeIn 0.4s cubic-bezier(0.2, 0, 0, 1)',
            'slide-up': 'slideUp 0.5s cubic-bezier(0.2, 0, 0, 1)',
            'scale-in': 'scaleIn 0.3s cubic-bezier(0.2, 0, 0, 1)',
          },
          keyframes: {
            fadeIn: {
              '0%': { opacity: '0' },
              '100%': { opacity: '1' },
            },
            slideUp: {
              '0%': { opacity: '0', transform: 'translateY(16px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            },
            scaleIn: {
              '0%': { opacity: '0', transform: 'scale(0.95)' },
              '100%': { opacity: '1', transform: 'scale(1)' },
            },
          },
        }
      }
    }
  </script>
  <style>
    /* ═══ Theme Variables ═══ */
    :root,
    [data-theme="emerald"] {
      --color-primary: #1A6B52;
      --color-primary-container: #D6F5E6;
      --color-primary-on-container: #0D3B2D;
      --color-primary-light: #E8F5ED;
      --color-dark-primary: #4ADE9C;
      --color-dark-primary-container: #0D3B2D;
      --color-dark-primary-light: #1A3D2E;
      --color-ambient-1: rgba(214, 245, 230, 0.25);
      --color-ambient-2: rgba(232, 245, 237, 0.2);
      --color-dark-ambient-1: rgba(74, 222, 156, 0.06);
      --color-dark-ambient-2: rgba(74, 222, 156, 0.04);
    }

    [data-theme="indigo"] {
      --color-primary: #4F46E5;
      --color-primary-container: #E0E7FF;
      --color-primary-on-container: #312E81;
      --color-primary-light: #EEF2FF;
      --color-dark-primary: #818CF8;
      --color-dark-primary-container: #312E81;
      --color-dark-primary-light: #1E1B4B;
      --color-ambient-1: rgba(224, 231, 255, 0.25);
      --color-ambient-2: rgba(238, 242, 255, 0.2);
      --color-dark-ambient-1: rgba(129, 140, 248, 0.06);
      --color-dark-ambient-2: rgba(129, 140, 248, 0.04);
    }

    [data-theme="slate"] {
      --color-primary: #334155;
      --color-primary-container: #E2E8F0;
      --color-primary-on-container: #0F172A;
      --color-primary-light: #F1F5F9;
      --color-dark-primary: #94A3B8;
      --color-dark-primary-container: #1E293B;
      --color-dark-primary-light: #0F172A;
      --color-ambient-1: rgba(226, 232, 240, 0.25);
      --color-ambient-2: rgba(241, 245, 249, 0.2);
      --color-dark-ambient-1: rgba(148, 163, 184, 0.06);
      --color-dark-ambient-2: rgba(148, 163, 184, 0.04);
    }

    [data-theme="rose"] {
      --color-primary: #E11D48;
      --color-primary-container: #FFE4E6;
      --color-primary-on-container: #881337;
      --color-primary-light: #FFF1F2;
      --color-dark-primary: #FB7185;
      --color-dark-primary-container: #881337;
      --color-dark-primary-light: #4C0519;
      --color-ambient-1: rgba(255, 228, 230, 0.25);
      --color-ambient-2: rgba(255, 241, 242, 0.2);
      --color-dark-ambient-1: rgba(251, 113, 133, 0.06);
      --color-dark-ambient-2: rgba(251, 113, 133, 0.04);
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #FAFAF8;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      transition: background-color 0.3s ease, color 0.3s ease;
    }

    .dark body,
    html.dark body {
      background: #0F0F0F;
      color: #E8E6E3;
    }

    /* Material 3 Surface Tint */
    .surface-tint {
      background: #FFFFFF;
      border: 1px solid #E0DED9;
    }

    .surface-container {
      background: #F5F4F0;
    }

    /* Subtle ambient background */
    .ambient-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      background:
        radial-gradient(ellipse at 20% 0%, var(--color-ambient-1) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 100%, var(--color-ambient-2) 0%, transparent 50%),
        #FAFAF8;
      transition: background 0.3s ease;
    }

    html.dark .ambient-bg {
      background:
        radial-gradient(ellipse at 20% 0%, var(--color-dark-ambient-1) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 100%, var(--color-dark-ambient-2) 0%, transparent 50%),
        #0F0F0F;
    }

    /* Clean scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: #C8C5BF;
      border-radius: 10px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #A8A5A0;
    }

    html.dark ::-webkit-scrollbar-thumb {
      background: #444;
    }

    html.dark ::-webkit-scrollbar-thumb:hover {
      background: #555;
    }

    /* Hero gradient for image overlays */
    .hero-gradient {
      background: linear-gradient(180deg, rgba(0, 0, 0, 0) 0%, rgba(0, 0, 0, 0.5) 100%);
    }

    /* Print styles */
    @media print {
      .ambient-bg {
        display: none;
      }
    }
  </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@19.0.0",
    "react-dom": "https://esm.sh/react-dom@19.0.0",
    "react-dom/client": "https://esm.sh/react-dom@19.0.0/client",
    "lucide-react": "https://esm.sh/lucide-react@0.475.0",
    "@google/genai": "https://esm.sh/@google/genai@1.34.0",
    "mermaid": "https://esm.sh/mermaid@10.9.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react/": "https://esm.sh/react@^19.2.4/"
  }
}
</script>
  <link rel="stylesheet" href="/index.css">
</head>

<body>
  <div class="ambient-bg"></div>
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
